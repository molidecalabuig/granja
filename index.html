<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moli v36.5 - Connexió Segura</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        :root { --p: #1a252f; --s: #27ae60; --w: #f39c12; --d: #c0392b; --bg: #ecf0f1; --inf: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--p); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; padding: 20px; box-sizing: border-box; }
        .header { background: var(--p); color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .status-cloud { font-size: 0.75em; color: #2ecc71; margin-top: 5px; font-weight: bold; }
        .nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 10px; }
        .tab-btn { padding: 10px 2px; border: none; border-radius: 8px; background: #bdc3c7; cursor: pointer; font-weight: bold; font-size: 0.7em; }
        .tab-btn.active { background: var(--s); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 10px; }
        .card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 6px solid #ccc; position: relative; min-height: 140px; }
        .silo-actiu { border-top-color: var(--s); }
        .silo-critic { border-top-color: var(--d) !important; background: #fff5f5; }
        .silo-baix { border-top-color: var(--w) !important; background: #fffdf2; }
        .barra-f { background: #eee; height: 6px; border-radius: 3px; margin: 6px 0; overflow: hidden; }
        .barra-n { height: 100%; transition: 0.8s; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-gran { color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .consum-info { font-size: 0.65em; color: #e67e22; font-weight: bold; margin-top: 4px; display: block; }
        .log-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .log-actions { display: flex; gap: 8px; }
        .btn-mini { border: none; background: #eee; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>MOLÍ DE CALABUIG</h2>
        <p style="opacity: 0.8;">Accés restringit (v36.5)</p>
        <input type="password" id="pin-input" placeholder="PIN d'accés" style="max-width: 200px; text-align: center;">
        <button class="btn-gran" style="background: var(--s); max-width: 200px;" onclick="checkPin()">ENTRAR</button>
    </div>

    <div id="app-content" class="hidden">
        <div class="header">
            <div>Moli de Calabuig v36.5</div>
            <div class="status-cloud">☁️ NÚVOL SEGUR ACTIU</div>

        </div>

        <div class="nav">
            <button class="tab-btn active" id="btn-estat" onclick="showTab('estat')">📉 SILOS</button>
            <button class="tab-btn" id="btn-entrada" onclick="showTab('entrada')">🚜 ALB.</button>
            <button class="tab-btn" id="btn-mov-p" onclick="showTab('mov-p')">⚖️ PINS.</button>
            <button class="tab-btn" id="btn-mov-a" onclick="showTab('mov-a')">🐄 BEST.</button>
            <button class="tab-btn" id="btn-historic" onclick="showTab('historic')">📜 LOG</button>
        </div>

        <div id="sec-estat"><div class="grid" id="silos-cont"></div></div>

        <div id="sec-entrada" class="hidden">
            <div class="card" style="max-width: 400px; margin: auto;">
                <h3>📝 Nou Albarà</h3>
                <input type="date" id="alb-data">
                <input type="text" id="alb-codi" placeholder="Número Albarà">
                <input type="number" id="alb-total" placeholder="Total Kg" oninput="validarAlb()">
                <div id="alb-llista"></div>
                <div id="alb-fb" style="text-align:center; padding:10px; font-weight:bold"></div>
                <button class="btn-gran" id="btn-save-alb" style="background:var(--s)" onclick="guardarAlb()" disabled>💾 GUARDAR</button>
            </div>
        </div>

        <div id="sec-mov-p" class="hidden">
            <div class="card" style="max-width: 400px; margin: auto;">
                <h3>🔄 Moure Pinso Intern</h3>
                <input type="date" id="p-data">
                <label>Origen:</label><select id="p-origen"></select>
                <label>Destí:</label><select id="p-desti"></select>
                <input type="number" id="p-kg" placeholder="Kg">
                <button class="btn-gran" style="background:var(--w)" onclick="executarMovPinso()">MOURE</button>
            </div>
        </div>

        <div id="sec-mov-a" class="hidden">
            <div class="card" style="max-width: 400px; margin: auto;">
                <h3>🐂 Gestió de Bestiar</h3>
                <input type="date" id="a-data">
                <select id="a-tipus" onchange="canviTipusMov()">
                    <option value="TRASLLAT">Trasllat Intern</option>
                    <option value="ENTRADA">Entrada d'Animals</option>

                    <option value="MORT">Baixa (Mort)</option>
                    <option value="SORTIDA">Sortida (Escorxador/Venda)</option>
                </select>
                <div id="div-origen"><label>Origen:</label><select id="a-origen"></select></div>
                <div id="div-desti"><label>Destí:</label><select id="a-desti"></select></div>
                <input type="number" id="a-n" value="1" placeholder="Nombre de caps">
                <button class="btn-gran" style="background:var(--inf)" onclick="executarMovAnimal()">REGISTRAR</button>
            </div>
        </div>

        <div id="sec-historic" class="hidden">
            <div class="card">
                <h3>📜 Registre de Moviments</h3>
                <div id="log-llista"></div>
            </div>
        </div>
    </div>

<script>
    const PIN_CORRECTE = "hortanic_00";
    const firebaseConfig = {
        apiKey: "AIzaSyDpORuJEtCNaGQlztiJOy6-HyHSyTYiMp4",
        authDomain: "moli-de-calabuig-7a2f2.firebaseapp.com",
        databaseURL: "https://moli-de-calabuig-7a2f2-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "moli-de-calabuig-7a2f2",
        storageBucket: "moli-de-calabuig-7a2f2.firebasestorage.app",
        messagingSenderId: "491308980737",
        appId: "1:491308980737:web:ecb92fcef2075faffcbe00"
    };

    // Inicialització de Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let dades = { silos: [], logs: [], lastSync: Date.now(), infermeria: { id: "INF", animals: 0, estoc: 0 } };
    const avuiStr = new Date().toISOString().split('T')[0];

    // Funcions de Seguretat i Connexió
    function iniciarConnexioSegura() {
        auth.signInAnonymously()
            .then(() => {
                console.log("Connexió xifrada establerta amb el núvol.");
                escudarNúvol();
            })
            .catch((error) => {
                alert("Error de seguretat: " + error.message);
            });
    }

    function checkPin() {
        if(document.getElementById('pin-input').value === PIN_CORRECTE) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').classList.remove('hidden');
            iniciarConnexioSegura();
        } else {
            alert("PIN Incorrecte");
        }
    }

    function escudarNúvol() {
        db.ref('moli_data').on('value', (snapshot) => {
            const val = snapshot.val();
            if (val) {
                dades = val;
                if(!dades.logs) dades.logs = [];
                calcularConsum();
                renderSilos();
                selects();
                if (document.getElementById('sec-historic').className !== 'hidden') renderLogs();
            }
        });
    }

    // Funcions de Lògica de Negoci

    function calcularConsum(dataReferenciaManual = null) {
        const ara = Date.now();
        const iniciCàlcul = dataReferenciaManual || dades.lastSync || ara;
        const hores = (ara - iniciCàlcul) / (1000 * 60 * 60);
        if (hores > 0.05) {
            dades.silos.forEach(s => {
                if (s.cap > 0) {
                    let consumHores = (s.cap * 9 / 24) * hores;
                    s.estoc = Math.max(0, s.estoc - consumHores);
                }
            });
            dades.lastSync = ara;
        }
    }

    function renderSilos() {
        const cont = document.getElementById('silos-cont');
        cont.innerHTML = '';
        dades.silos.forEach((s, idx) => {
            const cDiari = s.cap * 9;
            const dies = s.cap > 0 ? Math.floor(s.estoc / cDiari) : 0;
            let cls = "card " + (s.cap > 0 ? (s.estoc < 1500 ? 'silo-critic' : (dies < 4 ? 'silo-baix' : 'silo-actiu')) : '');
            cont.innerHTML += `
                <div class="${cls}">
                    <b>${s.id}</b>
                    <div class="barra-f"><div class="barra-n" style="width:${Math.min((s.estoc/s.max)*100, 100)}%; background:${s.estoc < 1500 ? 'var(--d)' : 'var(--s)'}"></div></div>
                    <div style="font-weight:bold; font-size:1.1em">${Math.round(s.estoc)} kg</div>
                    <div style="font-size:0.75em">${s.cap} cap • ${dies} dies</div>
                    <span class="consum-info">📉 -${cDiari} kg/dia</span>
                    <button style="width:100%; font-size:0.65em; margin-top:5px; padding:4px" onclick="ajust(${idx})">AJUST REALS</button>
                </div>`;
        });
    }

    function showTab(t) {
        ["estat","entrada","mov-p","mov-a","historic"].forEach(s => {
            document.getElementById('sec-'+s).classList.add('hidden');
            document.getElementById('btn-'+s).classList.remove('active');
        });
        document.getElementById('sec-'+t).classList.remove('hidden');
        document.getElementById('btn-'+t).classList.add('active');
        if(t==='entrada') { document.getElementById('alb-data').value = avuiStr; prepararAlb(); }
        if(t==='mov-p') { document.getElementById('p-data').value = avuiStr; }
        if(t==='mov-a') { document.getElementById('a-data').value = avuiStr; canviTipusMov(); }
        if(t==='historic') renderLogs();
    }

    function ajustarDades(novaData) {
        novaData.lastSync = Date.now();
        db.ref('moli_data').set(novaData);
    }

    function ajust(i) {
        let s = dades.silos[i];
        let c = prompt("Animals reals en aquest silo?", s.cap); if(c!==null) s.cap = parseInt(c) || 0;
        let k = prompt("Quilos reals en aquest silo?", s.estoc); if(k!==null) s.estoc = parseFloat(k) || 0;
        ajustarDades(dades);
    }

    function prepararAlb() {
        document.getElementById('alb-llista').innerHTML = dades.silos.map(s => `
            <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee; align-items:center">
                <b>${s.id}</b> <input type="number" class="in-alb" data-id="${s.id}" style="width:100px" oninput="validarAlb()">
            </div>`).join('');
    }

    function validarAlb() {
        let t = parseFloat(document.getElementById('alb-total').value) || 0;
        let s = 0; let over = false;
        document.querySelectorAll('.in-alb').forEach(i => {
            let v = parseFloat(i.value) || 0;
            let silo = dades.silos.find(x => x.id === i.dataset.id);
            if(v + silo.estoc > silo.max) over = true;
            s += v;
        });
        let ok = t > 0 && Math.abs(t - s) < 1 && !over && document.getElementById('alb-codi').value !== "";
        document.getElementById('alb-fb').innerHTML = over ? "⚠️ SOBREPASSES MÀXIM!" : (ok ? "✅ QUADRAT" : "Falten " + Math.round(t-s) + "kg");
        document.getElementById('btn-save-alb').disabled = !ok;
    }

    function guardarAlb() {
        const dataInput = document.getElementById('alb-data').value;
        const codi = document.getElementById('alb-codi').value;
        let resum = ""; let totalKg = 0;
        document.querySelectorAll('.in-alb').forEach(i => {
            let v = parseFloat(i.value) || 0;
            if(v > 0) {
                dades.silos.find(x => x.id === i.dataset.id).estoc += v;
                resum += i.dataset.id + ":" + v + " ";
                totalKg += v;
            }
        });
        dades.logs.unshift({ id: Date.now(), data: dataInput, t: "ALBARÀ", txt: "Nº "+codi + " ("+totalKg+"kg)", val: resum, kg: totalKg });
        calcularConsum(new Date(dataInput).getTime());
        ajustarDades(dades);
        showTab('estat');
    }

    function executarMovPinso() {
        const dataInput = document.getElementById('p-data').value;
        const oID = document.getElementById('p-origen').value;
        const dID = document.getElementById('p-desti').value;
        const k = parseFloat(document.getElementById('p-kg').value);
        let ori = dades.silos.find(s => s.id === oID);
        if(!k || k > ori.estoc) return alert("Error en quantitat");
        ori.estoc -= k;
        if(dID === "INF") dades.infermeria.estoc += k; else dades.silos.find(s => s.id === dID).estoc += k;
        dades.logs.unshift({ id: Date.now(), data: dataInput, t: "PINSO", txt: k+"kg de "+oID+" a "+dID, ori: oID, des: dID, kg: k });
        calcularConsum(new Date(dataInput).getTime());
        ajustarDades(dades);
        showTab('estat');
    }

    function executarMovAnimal() {
        const dataInput = document.getElementById('a-data').value;
        const t = document.getElementById('a-tipus').value;
        const n = parseInt(document.getElementById('a-n').value) || 0;
        const idOri = document.getElementById('a-origen').value;
        const idDes = document.getElementById('a-desti').value;
        calcularConsum();
        if(t === "TRASLLAT") {
            (idOri==="INF"?dades.infermeria:dades.silos.find(s=>s.id===idOri)).cap -= n;
            (idDes==="INF"?dades.infermeria:dades.silos.find(s=>s.id===idDes)).cap += n;
        } else if(t === "ENTRADA") {
            (idDes==="INF"?dades.infermeria:dades.silos.find(s=>s.id===idDes)).cap += n;
        } else {
            (idOri==="INF"?dades.infermeria:dades.silos.find(s=>s.id===idOri)).cap -= n;
        }
        dades.logs.unshift({ id: Date.now(), data: dataInput, t: t, txt: n+" caps ("+idOri+"->"+idDes+")" });
        ajustarDades(dades);
        showTab('estat');
    }

    function renderLogs() {
        const logCont = document.getElementById('log-llista');
        logCont.innerHTML = (dades.logs || []).slice(0, 30).map((l, index) => `
            <div class="log-item">
                <span><b>[${l.data}]</b> ${l.t}: ${l.txt}</span>
                <div class="log-actions">
                    <button class="btn-mini" onclick="editarLog(${index})">✏️</button>
                    <button class="btn-mini" onclick="eliminarLog(${index})">🗑️</button>
                </div>
            </div>`).join('') || 'Sense registres.';
    }

    function editarLog(index) {
        let l = dades.logs[index];
        let novaData = prompt("Data (AAAA-MM-DD):", l.data);
        if(!novaData) return;
        let nouTxt = prompt("Descripció del moviment:", l.txt);
        if(!nouTxt) return;

        if(l.t === "PINSO" || l.t === "ALBARÀ") {
            let nouKg = prompt("Corregir quilos totals (només número):", l.kg);
            if(nouKg !== null && parseFloat(nouKg) !== l.kg) {
                let diff = parseFloat(nouKg) - l.kg;
                if(l.t === "PINSO") {
                    let ori = dades.silos.find(s => s.id === l.ori);
                    let des = (l.des === "INF") ? dades.infermeria : dades.silos.find(s => s.id === l.des);
                    if(ori) ori.estoc -= diff;
                    if(des) des.estoc += diff;
                } else {
                    let siloID = l.val.split(":")[0];
                    let silo = dades.silos.find(s => s.id === siloID);
                    if(silo) silo.estoc += diff;
                }
                l.kg = parseFloat(nouKg);
            }
        }
        l.data = novaData;
        l.txt = nouTxt;
        ajustarDades(dades);
    }

    function eliminarLog(index) {
        let l = dades.logs[index];
        let revertir = (l.t === "ALBARÀ" || l.t === "PINSO") ?
            confirm("Vols REVERTIR els quilos al silo abans d'esborrar?") : confirm("Segur que vols esborrar?");
       
        if(!revertir && (l.t !== "ALBARÀ" && l.t !== "PINSO")) return;

        if(revertir && (l.t === "ALBARÀ" || l.t === "PINSO")) {
            if(l.t === "ALBARÀ") {
                let parts = l.val.trim().split(" ");
                parts.forEach(p => {
                    let [id, kg] = p.split(":");
                    let silo = dades.silos.find(s => s.id === id);
                    if(silo) silo.estoc -= parseFloat(kg);
                });
            } else {
                let ori = dades.silos.find(s => s.id === l.ori);
                let des = (l.des === "INF") ? dades.infermeria : dades.silos.find(s => s.id === l.des);
                if(ori) ori.estoc += l.kg;
                if(des) des.estoc -= l.kg;
            }
        }
        dades.logs.splice(index, 1);
        ajustarDades(dades);
    }

    function canviTipusMov() {
        const t = document.getElementById('a-tipus').value;
        document.getElementById('div-origen').style.display = (t==="ENTRADA") ? "none" : "block";
        document.getElementById('div-desti').style.display = (t==="MORT" || t==="SORTIDA") ? "none" : "block";
    }

    function selects() {
        let opKg = dades.silos.map(s => `<option value="${s.id}">${s.id} (${Math.round(s.estoc)}kg)</option>`).join('');
        let opCap = dades.silos.map(s => `<option value="${s.id}">${s.id} (${s.cap} cap)</option>`).join('');
        document.getElementById('p-origen').innerHTML = opKg;
        document.getElementById('p-desti').innerHTML = `<option value="INF">🚑 INF</option>` + dades.silos.map(s => `<option value="${s.id}">${s.id}</option>`).join('');
        document.getElementById('a-origen').innerHTML = `<option value="INF">🚑 INF</option>` + opCap;
        document.getElementById('a-desti').innerHTML = `<option value="INF">🚑 INF</option>` + opCap;
    }
</script>
</body>
</html>
